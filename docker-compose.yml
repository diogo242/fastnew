services:
  postgres:
    image: postgres:16-alpine
    container_name: unipay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unipay
      POSTGRES_PASSWORD: unipay_secret
      POSTGRES_DB: unipay_verify
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
